services:
  mysql:
    image: mysql:8.4
    container_name: infos-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "Zyadayman2006#"
      MYSQL_DATABASE: "atomic"
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$${MYSQL_ROOT_PASSWORD}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - app-net

  kafka:
    image: apache/kafka:4.3.0
    container_name: infos-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://:9093,PLAINTEXT://:29092,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092   #configured two Kafka listeners
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0  #reduces delay when a consumer group starts.
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs   #log data inside the container.
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s
    networks:
      - app-net

  kafka-init:
    image: apache/kafka:4.3.0
    container_name: infos-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic demo-topic --partitions 1 --replication-factor 1
        echo "Topic demo-topic is ready"
    networks:
      - app-net

  backend:
    build:
      context: ./backend
    container_name: infos-backend
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/atomic?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "Zyadayman2006#"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      SPRING_KAFKA_CONSUMER_GROUP_ID: "infos-app-group"
      SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: "earliest"       #if the consumer group has no saved offset, it starts reading from the beginning of the topic.
      APP_KAFKA_TOPIC: "demo-topic"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
    container_name: infos-frontend
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: infos-kafka-ui
    ports:
      - "9093:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  mysql-data:
