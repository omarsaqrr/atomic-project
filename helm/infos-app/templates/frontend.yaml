apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "infos-app.fullname" . }}-frontend-nginx
  labels:
    {{- include "infos-app.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://{{ include "infos-app.fullname" . }}-backend:{{ .Values.backend.port }}/api/;
        }

        location /actuator/ {
            proxy_pass http://{{ include "infos-app.fullname" . }}-backend:{{ .Values.backend.port }}/actuator/;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "infos-app.fullname" . }}-frontend
  labels:
    {{- include "infos-app.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: http
  selector:
    app.kubernetes.io/component: frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "infos-app.fullname" . }}-frontend
  labels:
    {{- include "infos-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: frontend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: frontend
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "infos-app.fullname" . }}-frontend-nginx
