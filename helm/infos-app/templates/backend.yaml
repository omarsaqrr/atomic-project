apiVersion: v1
kind: Service
metadata:
  name: {{ include "infos-app.fullname" . }}-backend
  labels:
    {{- include "infos-app.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: http
  selector:
    app.kubernetes.io/component: backend
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "infos-app.fullname" . }}-backend
  labels:
    {{- include "infos-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        - name: wait-for-mysql
          image: {{ .Values.mysql.waitImage }}
          env:
            - name: MYSQL_PWD
              value: {{ .Values.mysql.password | quote }}
          command:
            - /bin/sh
            - -c
            - |
              until mysqladmin ping -h {{ .Values.mysql.host }} -u{{ .Values.mysql.username }} --silent; do
                echo "Waiting for MySQL..."
                sleep 3
              done
              echo "MySQL is ready"

        - name: wait-for-kafka
          image: {{ .Values.kafka.image }}
          command:
            - /bin/sh
            - -c
            - |
              until /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server {{ include "infos-app.fullname" . }}-kafka:29092 > /dev/null 2>&1; do
                echo "Waiting for Kafka..."
                sleep 3
              done
              echo "Kafka is ready"
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
              name: http
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://{{ .Values.mysql.host }}:{{ .Values.mysql.port }}/{{ .Values.mysql.database }}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.mysql.username | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              value: {{ .Values.mysql.password | quote }}
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "{{ include "infos-app.fullname" . }}-kafka:29092"
            - name: SPRING_KAFKA_CONSUMER_GROUP_ID
              value: "infos-app-group"
            - name: SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET
              value: "earliest"
            - name: APP_KAFKA_TOPIC
              value: {{ .Values.kafka.topic | quote }}
            - name: SPRING_JPA_DATABASE_PLATFORM
              value: "org.hibernate.dialect.MySQLDialect"