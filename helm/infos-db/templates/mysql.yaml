apiVersion: v1
kind: Service
metadata:
  name: infos-mysql
spec:
  ports:
    - port: {{ .Values.mysql.port }}
      targetPort: mysql
  selector:
    app: infos-mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infos-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infos-mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: infos-mysql
    spec:
      containers:
        - name: mysql
          image: {{ .Values.mysql.image }}
          ports:
            - containerPort: {{ .Values.mysql.port }}
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: {{ .Values.mysql.rootPassword | quote }}
            - name: MYSQL_DATABASE
              value: {{ .Values.mysql.database | quote }}
            - name: MYSQL_ROOT_HOST
              value: "%"
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 20
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: infos-mysql-data